name: Aggregate news

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir feedparser requests pyyaml tweepy

      - name: Aggregate feeds
        run: python scripts/build.py
        continue-on-error: true
        env:
          X_BEARER_TOKEN:    ${{ secrets.X_BEARER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit JSON
        run: |
          git config user.name "blair-bot"
          git config user.email "blairbot@example.com"
          git add data/*.json data/history/*.json 2>/dev/null || true
          git commit -m "chore: aggregate $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "No changes"
          git push
